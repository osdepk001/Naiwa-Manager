<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奶蛙管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 顶部导航栏 -->
  <header class="topbar">
    <div class="topbar-title">奶蛙管理</div>
    <nav class="topbar-nav">
      <button class="nav-btn active" data-tab="local">全部文件</button>
      <button class="nav-btn" data-tab="images">图片库</button>
      <button class="nav-btn" data-tab="videos">视频库</button>
      <button class="nav-btn" data-tab="search">在线找图</button>
      <button class="nav-btn" data-tab="about">关于</button>
    </nav>
    <div class="topbar-actions">
      <button class="btn btn-primary" id="btn-upload-top">+ 添加文件</button>
    </div>
  </header>

  <!-- 批量操作工具栏 -->
  <div class="batch-bar" id="batch-bar">
    <span class="batch-count" id="batch-count">已选 0 项</span>
    <button class="btn btn-secondary btn-sm" id="btn-select-all">全选</button>
    <button class="btn btn-secondary btn-sm" id="btn-deselect-all">取消全选</button>
    <button class="btn btn-danger btn-sm" id="btn-batch-delete">批量删除</button>
    <button class="btn btn-secondary btn-sm" id="btn-exit-select">退出选择</button>
  </div>

  <!-- 主内容区 -->
  <main class="main-content">
    <!-- Tab: 全部文件（总览） -->
    <section id="tab-local" class="tab-content active">
      <div class="tab-header">
        <h2>全部文件</h2>
        <div class="tab-actions">
          <button class="btn btn-primary" id="btn-upload">+ 添加文件</button>
          <button class="btn btn-secondary" id="btn-refresh">刷新</button>
          <button class="btn btn-secondary" id="btn-operate-mode">操作</button>
        </div>
      </div>

      <div class="section">
        <h3>图片（<span id="local-image-count">0</span>）<span class="section-select" id="section-select-images"><label class="section-check"><input type="checkbox" id="check-all-images"> 全选图片</label></span></h3>
        <div class="media-grid" id="local-images-grid"></div>
      </div>

      <div class="section">
        <h3>视频（<span id="local-video-count">0</span>）<span class="section-select" id="section-select-videos"><label class="section-check"><input type="checkbox" id="check-all-videos"> 全选视频</label></span></h3>
        <div class="media-grid" id="local-videos-grid"></div>
      </div>
    </section>

    <!-- Tab: 图片库 -->
    <section id="tab-images" class="tab-content">
      <div class="tab-header">
        <h2>图片库</h2>
        <div class="tab-actions">
          <button class="btn btn-primary" id="btn-upload-images">+ 添加图片</button>
          <button class="btn btn-secondary" id="btn-operate-mode-images">操作</button>
        </div>
      </div>
      <div class="media-grid" id="images-grid"></div>
      <div class="empty-state" id="images-empty">
        <p>还没有图片，点击「添加图片」上传吧</p>
      </div>
    </section>

    <!-- Tab: 视频库 -->
    <section id="tab-videos" class="tab-content">
      <div class="tab-header">
        <h2>视频库</h2>
        <div class="tab-actions">
          <button class="btn btn-primary" id="btn-upload-videos">+ 添加视频</button>
          <button class="btn btn-secondary" id="btn-operate-mode-videos">操作</button>
        </div>
      </div>
      <div class="media-grid" id="videos-grid"></div>
      <div class="empty-state" id="videos-empty">
        <p>还没有视频，点击「添加视频」上传吧</p>
      </div>
    </section>

    <!-- Tab: 在线找图 -->
    <section id="tab-search" class="tab-content">
      <div class="tab-header">
        <h2>在线找图</h2>
      </div>
      <div class="search-panel">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="输入关键词搜索…">
          <button class="btn btn-primary" id="btn-search">搜索</button>
        </div>
        <div class="search-options">
          <label class="gif-toggle">
            <input type="checkbox" id="gif-only">
            <span class="toggle-label">仅显示动图（GIF）</span>
          </label>
        </div>
        <div class="search-tags">
          <span>热门搜索：</span>
          <button class="tag" data-keyword="奶蛙">奶蛙</button>
          <button class="tag" data-keyword="小马云">小马云</button>
          <button class="tag" data-keyword="小黑子">小黑子</button>
          <button class="tag" data-keyword="熊猫表情">熊猫表情</button>
          <button class="tag" data-keyword="杰瑞">杰瑞</button>
          <button class="tag" data-keyword="牛牛表情包">牛牛表情包</button>
        </div>
      </div>

      <div class="search-loading" id="search-loading">
        <div class="spinner"></div>
        <p>正在检索图片…</p>
      </div>

      <div class="search-results" id="search-results">
        <div class="search-results-header">
          <span id="search-result-count"></span>
        </div>
        <div class="media-grid large" id="search-results-grid"></div>
      </div>

      <div class="empty-state visible" id="search-empty">
        <p>输入关键词点击搜索，图片结果会直接显示在这里</p>
      </div>

      <div class="search-error" id="search-error">
        <p id="search-error-msg"></p>
      </div>
    </section>

    <!-- Tab: 关于 -->
    <section id="tab-about" class="tab-content">
      <div class="about-container">
        <div class="about-card">
          <h2 class="about-title" id="about-app-name">奶蛙管理</h2>
          <p class="about-version" id="about-version">版本 --</p>

          <div class="about-info">
            <div class="about-row">
              <span class="about-label">作者</span>
              <span class="about-value">OsDepK</span>
            </div>
            <div class="about-row" id="about-latest-row" style="display:none">
              <span class="about-label">最新版本</span>
              <span class="about-value" id="about-latest-version">--</span>
            </div>
          </div>

          <div class="about-actions">
            <button class="btn btn-primary" id="btn-check-update">检查更新</button>
            <button class="btn btn-secondary" id="btn-open-update-url" style="display:none">前往下载</button>
          </div>

          <div class="about-status" id="about-status"></div>
          <div class="about-changelog" id="about-changelog" style="display:none"></div>

          <div class="about-divider"></div>

          <div class="about-menu">
            <a class="about-menu-item about-menu-main" id="btn-about-official-site" href="javascript:void(0)">官方网站</a>
            <div class="about-menu-extra" id="about-menu-extra" style="display:none">
              <div class="about-menu-list" id="about-menu-list">
                <!-- 动态菜单项由 API 返回 -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 更新对话框 -->
  <div class="update-overlay" id="update-dialog-overlay">
    <div class="update-dialog">
      <div class="update-dialog-header">
        <h2>发现新版本</h2>
        <span class="update-dialog-badge" id="update-dialog-force" style="display:none">强制更新</span>
      </div>
      <div class="update-dialog-body">
        <div class="update-dialog-versions">
          <span class="update-dialog-label">当前版本</span>
          <span class="update-dialog-value" id="update-dialog-current">--</span>
          <span class="update-dialog-arrow">&rarr;</span>
          <span class="update-dialog-label">最新版本</span>
          <span class="update-dialog-value update-dialog-new" id="update-dialog-version">--</span>
        </div>
        <div class="update-dialog-changelog">
          <div class="update-dialog-changelog-title">更新日志</div>
          <pre id="update-dialog-changelog">暂无更新日志</pre>
        </div>
      </div>
      <div class="update-dialog-footer">
        <button class="btn btn-primary" id="btn-update-now">立即更新</button>
        <button class="btn btn-secondary" id="btn-update-cancel">取消</button>
      </div>
    </div>
  </div>

  <!-- 预览弹窗 -->
  <div class="modal-overlay" id="preview-modal">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <span class="modal-filename" id="modal-filename"></span>
        <div class="modal-actions">
          <button class="btn btn-secondary btn-sm" id="modal-open-folder">打开目录</button>
          <button class="btn btn-secondary btn-sm" id="modal-open-system">系统播放器打开</button>
          <button class="btn btn-danger btn-sm" id="modal-delete">删除</button>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
